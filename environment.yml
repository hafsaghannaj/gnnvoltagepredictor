name: gnn-battery
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - plotly>=5.15
  - seaborn>=0.12
  - jupyter
  - jupyterlab>=4.0
  - ipywidgets
  - tqdm
  - pyyaml
  - pip:
    - torch==2.2.0+cu121 --index-url https://download.pytorch.org/whl/cu121
    - torchvision==0.17.0+cu121 --index-url https://download.pytorch.org/whl/cu121
    - torch_geometric==2.5.0
    - torch_scatter==2.1.2+pt22cu121 --find-links https://data.pyg.org/whl/torch-2.2.0+cu121.html
    - torch_sparse==0.6.18+pt22cu121 --find-links https://data.pyg.org/whl/torch-2.2.0+cu121.html
    - torch_cluster==1.6.3+pt22cu121 --find-links https://data.pyg.org/whl/torch-2.2.0+cu121.html
    - pymatgen>=2024.2.20
    - matgl>=1.1.0
    - mp-api>=0.41.0
    - matminer>=0.9.0
    - dgl>=2.0.0
    - monty>=2024.2.2
